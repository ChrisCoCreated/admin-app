<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thrive Admin - Email Templates</title>
    <link rel="icon" type="image/svg+xml" href="./assets/app-icon.svg?v=20260314" />
    <link rel="alternate icon" href="./favicon.ico?v=20260314" sizes="any" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png?v=20260314" />
    <link rel="manifest" href="./site.webmanifest?v=20260314" />
    <meta name="theme-color" content="#31b7c8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Admin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260311" />
  </head>
  <body class="auth-pending">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="./index.html" aria-label="Thrive Admin home">
          <img class="brand-mark" src="./assets/thrive-mascot-RGB.svg" alt="Thrive mascot logo" />
          <span class="brand-text">Thrive Admin</span>
        </a>
        <div class="topbar-actions">
          <nav id="primaryNav" class="topnav" aria-label="Primary"></nav>
          <button id="signOutBtn" class="secondary" type="button">Sign out</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero compact">
        <h1>Email Templates</h1>
        <p id="statusMessage" class="muted">Checking access...</p>
      </section>

      <section class="panel">
        <h2>Draft in Outlook</h2>
        <p class="muted">Pick a template, edit the text if needed, then open a pre-filled draft in Outlook.</p>

        <div class="email-template-grid">
          <label class="field" for="templateSelect">
            Template
            <select id="templateSelect"></select>
          </label>
          <label class="field" for="toInput">
            To (optional)
            <input id="toInput" type="text" placeholder="name@company.com" />
          </label>
        </div>

        <label class="field row" for="subjectInput">
          Subject
          <input id="subjectInput" type="text" />
        </label>

        <label class="field row email-body-field" for="bodyInput">
          Body
          <textarea id="bodyInput"></textarea>
        </label>

        <div class="row wrap-row">
          <button id="draftOutlookBtn" type="button">Draft in Outlook</button>
          <button id="draftWebBtn" class="secondary" type="button">Open in Web (Fallback)</button>
          <button id="copyBodyBtn" class="secondary" type="button">Copy Body Text</button>
          <span id="actionStatus" class="muted"></span>
        </div>
      </section>
    </main>

    <script type="module" src="./email-templates.js"></script>
  </body>
</html>
