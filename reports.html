<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thrive Admin - Reports</title>
    <link rel="icon" type="image/svg+xml" href="./assets/thrive-mascot-RGB.svg?v=teal" />
    <link rel="alternate icon" href="./favicon.ico?v=teal" sizes="any" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-pending">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="./index.html" aria-label="Thrive Admin home">
          <img class="brand-mark" src="./assets/thrive-mascot-RGB.svg" alt="Thrive mascot logo" />
          <span class="brand-text">Thrive Admin</span>
        </a>
        <div class="topbar-actions">
          <nav id="primaryNav" class="topnav" aria-label="Primary"></nav>
          <button id="signOutBtn" class="secondary" type="button">Sign out</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero compact">
        <h1>Reports</h1>
        <p id="statusMessage" class="muted">Checking access...</p>
      </section>

      <section class="panel">
        <h2>Capacity Reports</h2>
        <p class="muted">Choose a period, then open either report in OneTouch.</p>
        <div class="row wrap-row">
          <label class="field" for="periodPresetSelect">
            Period
            <select id="periodPresetSelect">
              <option value="this_month" selected>This month</option>
              <option value="last_month">Last month</option>
              <option value="next_month">Next month</option>
              <option value="this_week">This week (Mon-Sun)</option>
              <option value="last_week">Last week (Mon-Sun)</option>
              <option value="next_week">Next week (Mon-Sun)</option>
            </select>
          </label>
          <a id="contractCapacityLink" class="button-link" href="#" target="_blank" rel="noopener noreferrer"
            >Open Contract Capacity</a
          >
          <a id="availabilityCapacityLink" class="button-link" href="#" target="_blank" rel="noopener noreferrer"
            >Open Availability Capacity</a
          >
        </div>
        <p id="dateRangeMessage" class="muted row-note"></p>
      </section>
    </main>

    <script type="module" src="./reports.js"></script>
  </body>
</html>
